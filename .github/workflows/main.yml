name: Build Tetris APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            expect \
            pkg-config \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libreadline-dev \
            libtk8.6 \
            libgdbm-dev \
            libdb-dev \
            libbz2-dev \
            liblzma-dev \
            libbluetooth-dev \
            libffi-dev \
            libgles2-mesa-dev
          
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython
          
      - name: Build APK
        run: |
          buildozer android clean
          expect -c "spawn buildozer android debug; expect \"Accept?\" { send \"y\r\" }; interact"
        timeout-minutes: 60
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-APK
          path: bin/*.apk
          if-no-files-found: error
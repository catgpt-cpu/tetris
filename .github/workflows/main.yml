name: Build Tetris APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Buildozer & Deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip python3-venv
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Accept Android Licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56a5727a5f2e8fe7f7c7ac0a5e3f1b7a9a5e3f1" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          yes | sdkmanager --licenses || true

      - name: Build APK Pygame
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-APK
          path: bin/*.apk
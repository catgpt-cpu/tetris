name: Build Tetris APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install Buildozer
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk
          pip install --upgrade pip
          pip install buildozer cython
          
      - name: Build APK
        run: |
          # Build pertama: biar download SDK + gagal karena license
          buildozer android debug || true
          # Build kedua: sekarang license udah di accept otomatis sama buildozer
          buildozer android debug
          
      - uses: actions/upload-artifact@v4
        with:
          name: Tetris-APK
          path: bin/*.apk
name: Build Tetris APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk expect ccache
          
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython
          
      - name: Build APK Pygame
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/repositories.cfg
          yes | buildozer android debug
          echo "=== ISI FOLDER BIN ==="
          ls -la bin/
        timeout-minutes: 120
        env:
          ANDROIDSDK: $HOME/.buildozer/android/platform/android-sdk
          ANDROIDNDK: $HOME/.buildozer/android/platform/android-ndk-r25b
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-Pygame-APK
          path: bin/*.apk
          if-no-files-found: error
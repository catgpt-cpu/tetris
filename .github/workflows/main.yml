name: Build Tetris APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Delete old cache
        run: rm -rf ~/.buildozer

      - name: Accept Licenses + Build APK
        run: |
          # Download SDK dulu
          buildozer android debug || true
          # Auto accept semua license
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          # Build beneran pake NDK 25b
          buildozer android debug android.ndk=25b android.api=33

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-APK
          path: bin/*.apk
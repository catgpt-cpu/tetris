name: Build Tetris APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install System Deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip wget
          pip install buildozer cython==0.29.33
      
      - name: Install Android SDK 31 + NDK 25
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d56a5727a5f2e8fe7f7c7ac0a5e3f1b7a9a5e3f1" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          sdkmanager --install "platform-tools" "platforms;android-31" "build-tools;31.0.0" "ndk;25.2.9519653"
      
      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/25.2.9519653
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          buildozer android debug
      
      - uses: actions/upload-artifact@v4
        with:
          name: Tetris-APK
          path: bin/*.apk
name: Build Tetris APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.9'}
      - run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip wget
          pip install buildozer cython==0.29.33
      - run: rm -rf.buildozer bin
      - run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0" "ndk;25.2.9519653"
      - env: {ANDROID_SDK_ROOT: /home/runner/android-sdk, ANDROID_NDK_ROOT: /home/runner/android-sdk/ndk/25.2.9519653}
        run: buildozer android debug
      - uses: actions/upload-artifact@v4
        with: {name: Tetris-APK, path: bin/*.apk}